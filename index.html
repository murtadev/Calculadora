<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    
</head>
<body>
    <!--Título da calculadora e deve ficar fora da margem-->
 <body class="calculadora"></div>
    <h1>Calculadora</h1>
    
    <!-- será onde os valores serão mostrados deve ter uma margem independente e ser um verde mais claro-->
    <input id = "visor" placeholder = "0">

<!--será onde os números serão digitados cada número deve ter uma margem independente-->
 <div class="botoes">
    <button onclick = "execution(1)">1</button>
    <button onclick = "execution(2)">2</button>
    <button onclick = "execution(3)">3</button>
    <button onclick = "execution(4)">4</button>
    <button onclick = "execution(5)">5</button>
    <button onclick = "execution(6)">6</button>
    <button onclick = "execution(7)">7</button>
    <button onclick = "execution(8)">8</button>
    <button onclick = "execution(9)">9</button>
    <button onclick = "execution(0)">0</button>
    <button onclick = "limpar()">AC</button>
    <button onclick = "execution('+')">+</button>
    <button onclick = "execution('-')">-</button>
    <button onclick = "execution('*')">x</button>
    <button onclick = "calcular()">=</button>

</div> 
    

<!--importar o CSS-->
<link rel = "stylesheet" href = "style.css">
<script src = "script.js"> </script>

</body> 
</html>
