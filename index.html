<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    
</head>
<body>
    <!--Título da calculadora e deve ficar fora da margem-->
<h1>Calculadora</h1>
<!-- será onde os valores serão mostrados deve ter uma margem independente e ser um verde mais claro-->
<h2>visor</h2>
    <input type = number id= "valores" placeholder = "">
<!--será onde os números serão digitados cada número deve ter uma margem independente-->
<h3>Campo 2 numeros e sinais</h3>
    <button id = "number0"> 0 </button>
    <button id = "number1"> 1 </button>
    <button id = "number2"> 2 </button>
    <button id = "number3"> 3 </button>
    <button id = "number4"> 4 </button>
    <button id = "number5"> 5 </button>
    <button id = "number6"> 6 </button>
    <button id = "number7"> 7 </button>
    <button id = "number8"> 8 </button>
    <button id = "number9"> 9 </button>
    <button id = "characterPlus"> + </button>
    <button id = "characterMinus"> - </button>
    <button id = "characterMultiplication"> * </button>
    <button id = "characterModulus"> % </button>


<!--importar o CSS-->
<link rel = "stylesheet" href = "style.css">
</body>
<script> src ="script.js" </script>
</html>
